name: Daily Instagram Story - @bemolle_diet

on:
  schedule:
    - cron: "0 22 * * *"  # バックアップ発火（GH Actionsは遅延あり）
  workflow_dispatch:
  repository_dispatch:
    types: [daily_story]  # cron-job.orgからの発火（主系）

jobs:
  post-story:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post story
        env:
          META_ACCESS_TOKEN:        ${{ secrets.META_ACCESS_TOKEN_STORIES }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          IMGBB_API_KEY:            ${{ secrets.IMGBB_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GOOGLE_REFRESH_TOKEN:     ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID:         ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:     ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: python post_story.py

      - name: Save photo rotation log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_photos.json
          git diff --staged --quiet || git commit -m "chore: update used_photos [skip ci]"
          git push
