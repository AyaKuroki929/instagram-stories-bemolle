name: Daily Instagram Story - @bemolle_diet

on:
  schedule:
    - cron: "0 22 * * *"  # 7:00 JST バックアップ（idempotency判定で重複投稿は防止）
  workflow_dispatch:
    inputs:
      force_facial_trial:
        description: '今日だけ ご新規＋肌質改善体験 を入れる'
        type: boolean
        default: false
  repository_dispatch:
    types: [daily_story]  # cron-job.orgからの発火（主系）

permissions:
  contents: write  # used_photos.json を main にプッシュするため

# 主系(cron-job.org)と予備(GitHub schedule)が同時刻に発火しても並走させない。
# 並走すると両方が古い last_post.json を読み「未投稿」と誤判定→二重投稿になるため。
concurrency:
  group: daily-story
  cancel-in-progress: false

jobs:
  post-story:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ref: main を明示。デフォルトはイベント発生時点のSHAのため、concurrencyキュー
      # 待ちの間にpushされた投稿マーカーを見落として二重投稿する穴を塞ぐ。
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post story
        env:
          META_ACCESS_TOKEN:        ${{ secrets.META_ACCESS_TOKEN_STORIES }}
          META_APP_SECRET:          ${{ secrets.META_APP_SECRET }}
          GH_PAT:                   ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:        ${{ github.repository }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          IMGBB_API_KEY:            ${{ secrets.IMGBB_API_KEY }}
          BLOB_READ_WRITE_TOKEN:    ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GOOGLE_REFRESH_TOKEN:     ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID:         ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:     ${{ secrets.GOOGLE_CLIENT_SECRET }}
          STORY_FORCE_FACIAL_TRIAL: ${{ github.event.inputs.force_facial_trial == 'true' && '1' || '' }}
        run: python post_story.py

      - name: Save photo rotation log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_photos.json last_post.json
          [ -f recent_texts.json ] && git add recent_texts.json || true
          [ -d fallback_photos ] && git add fallback_photos || true
          git diff --staged --quiet || git commit -m "chore: update used_photos [skip ci]"
          # push失敗＝投稿マーカー喪失＝予備cronが二重投稿する重大事象なのでリトライ＋通知
          ok=""
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then ok=1; break; fi
            echo "push失敗 ($i/3) → リトライ"; sleep $((i*5))
          done
          if [ -z "$ok" ]; then
            echo "::error::push failed after retries"
            curl -s -X POST https://api.line.me/v2/bot/message/broadcast \
              -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"messages":[{"type":"text","text":"🚨 ストーリー投稿: 状態ファイルのpushに3回失敗しました。予備cronが二重投稿する恐れがあります。Actionsを確認してください。"}]}'
            touch .line_notified  # 直後の failure() 汎用通知と二重送信しないための印
            exit 1
          fi

      # インフラ層の失敗（Secret欠落・timeout kill・pip失敗等）はPython内の通知に
      # 到達しないため、ジョブ失敗時はワークフロー側からLINEに知らせる
      - name: Notify on workflow failure
        if: failure()
        run: |
          # Python側が🚨/⚠️を送信済みなら重複送信しない（LINE枠節約）
          if [ -f .line_notified ]; then echo "Python側で通知済み → スキップ"; exit 0; fi
          curl -s -X POST https://api.line.me/v2/bot/message/broadcast \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"messages":[{"type":"text","text":"🚨 毎朝のIGストーリー投稿ワークフローが失敗しました（Secret欠落/タイムアウト等のインフラ層の可能性）。GitHub Actionsのログを確認してください。"}]}'
