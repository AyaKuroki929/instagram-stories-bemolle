name: Threads to Story - @bemolle_diet

on:
  schedule:
    - cron: "0 23 * * *"  # 8:00 JST バックアップ（idempotency判定で重複投稿は防止）
  workflow_dispatch:
    inputs:
      dryrun:
        description: '投稿せずプレビューURLだけ出す（確認用）'
        type: boolean
        default: false
  repository_dispatch:
    types: [threads_story]  # cron-job.orgからの発火（任意・主系にする場合）

permissions:
  contents: write  # last_post_threads.json を main にプッシュするため

jobs:
  threads-story:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post Threads story
        env:
          STORY_MODE:               threads
          STORY_DRYRUN:             ${{ github.event.inputs.dryrun == 'true' && '1' || '' }}
          META_ACCESS_TOKEN:        ${{ secrets.META_ACCESS_TOKEN_STORIES }}
          META_APP_SECRET:          ${{ secrets.META_APP_SECRET }}
          GH_PAT:                   ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:        ${{ github.repository }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          IMGBB_API_KEY:            ${{ secrets.IMGBB_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          THREADS_ACCESS_TOKEN_BEMOLLE: ${{ secrets.THREADS_ACCESS_TOKEN_BEMOLLE }}
        run: python post_story.py

      - name: Save post marker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f last_post_threads.json ] && git add last_post_threads.json || true
          git diff --staged --quiet || git commit -m "chore: update last_post_threads [skip ci]"
          git pull --rebase origin main && git push || echo "push競合スキップ（次回反映）"
