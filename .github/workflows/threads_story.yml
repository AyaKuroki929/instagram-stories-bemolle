name: Threads to Story - @bemolle_diet

on:
  schedule:
    - cron: "0 23 * * *"   # 8:00 JST（GitHubスケジュールは遅延しやすいため下に保険）
    - cron: "30 23 * * *"  # 8:30 JST バックアップ
    - cron: "0 0 * * *"    # 9:00 JST バックアップ（朝の投稿は時間帯で選ぶので中身は不変・二重投稿は防止）
  workflow_dispatch:
    inputs:
      dryrun:
        description: '投稿せずプレビューURLだけ出す（確認用）'
        type: boolean
        default: false
  repository_dispatch:
    types: [threads_story]  # cron-job.orgからの発火（任意・主系にする場合）

permissions:
  contents: write  # last_post_threads.json を main にプッシュするため

# 8:00/8:30/9:00 の複数cronが遅延で重なっても並走させない。
# threads側の二重投稿防止はローカルマーカーのみが防壁のため、並走は即二重投稿になる。
concurrency:
  group: threads-story
  cancel-in-progress: false

jobs:
  threads-story:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ref: main を明示。デフォルトはイベント発生時点のSHAを掴むため、
      # 先行jobの完了待ち(concurrencyキュー)中に投稿マーカーがpushされても
      # 古いスナップショットで走って同日ガードが素通り＝二重投稿になる。
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post Threads story
        env:
          STORY_MODE:               threads
          STORY_DRYRUN:             ${{ github.event.inputs.dryrun == 'true' && '1' || '' }}
          META_ACCESS_TOKEN:        ${{ secrets.META_ACCESS_TOKEN_STORIES }}
          META_APP_SECRET:          ${{ secrets.META_APP_SECRET }}
          GH_PAT:                   ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:        ${{ github.repository }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          IMGBB_API_KEY:            ${{ secrets.IMGBB_API_KEY }}
          BLOB_READ_WRITE_TOKEN:    ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          THREADS_API_TOKEN_BEMOLLE: ${{ secrets.THREADS_API_TOKEN_BEMOLLE }}
        run: python post_story.py

      - name: Save post marker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f last_post_threads.json ] && git add last_post_threads.json || true
          git diff --staged --quiet || git commit -m "chore: update last_post_threads [skip ci]"
          # マーカーのpush失敗＝8:30/9:00の予備cronが同じストーリーを再投稿するのでリトライ＋通知
          ok=""
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then ok=1; break; fi
            echo "push失敗 ($i/3) → リトライ"; sleep $((i*5))
          done
          if [ -z "$ok" ]; then
            echo "::error::push failed after retries"
            curl -s -X POST https://api.line.me/v2/bot/message/broadcast \
              -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"messages":[{"type":"text","text":"🚨 Threadsストーリー: 投稿マーカーのpushに3回失敗。予備cron(8:30/9:00)が二重投稿する恐れがあります。Actionsを確認してください。"}]}'
            touch .line_notified  # 直後の failure() 汎用通知と二重送信しないための印
            exit 1
          fi

      - name: Notify on workflow failure
        if: failure()
        run: |
          # Python側が🚨/⚠️を送信済みなら重複送信しない（LINE枠節約）
          if [ -f .line_notified ]; then echo "Python側で通知済み → スキップ"; exit 0; fi
          curl -s -X POST https://api.line.me/v2/bot/message/broadcast \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"messages":[{"type":"text","text":"🚨 Threads→ストーリーのワークフローが失敗しました（インフラ層の可能性）。GitHub Actionsのログを確認してください。"}]}'
