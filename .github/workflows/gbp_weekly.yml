name: Weekly GBP Post (LINEへ貼るだけ配信)

on:
  schedule:
    # 週2回投稿（2026 AIO/ローカルSEOの推奨頻度。プロフィールのアクティビティ score が
    # 上位3枠表示率を1.4倍にする＝新鮮さがAIの推薦シグナル）。テーマは6種を輪番。
    - cron: "30 23 * * 6"  # 土23:30 UTC = 日 8:30 JST
    - cron: "30 23 * * 2"  # 火23:30 UTC = 水 8:30 JST
  workflow_dispatch:        # 手動実行（今すぐ1本欲しい時）
  repository_dispatch:
    types: [gbp_weekly]     # cron-job.orgからの発火（GH Actionsの遅延/欠落対策）

permissions:
  contents: write  # gbp_state.json / gbp_used_photos.json を main にプッシュするため

# schedule と repository_dispatch の同時発火で2本生成・二重投稿になるのを防ぐ
concurrency:
  group: gbp-weekly
  cancel-in-progress: false

jobs:
  gbp-post:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Generate & deliver GBP post to LINE
        env:
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          MAKE_GBP_WEBHOOK:          ${{ secrets.MAKE_GBP_WEBHOOK }}
        run: python gbp_post.py

      - name: Save rotation state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gbp_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update GBP rotation state [skip ci]"
          # push失敗＝輪番が進まず同テーマ連投になるため1回だけリトライ
          git pull --rebase origin main && git push || { sleep 8; git pull --rebase origin main && git push; } || echo "push競合スキップ（次回反映）"

      - name: Notify on workflow failure
        if: failure()
        run: |
          curl -s -X POST https://api.line.me/v2/bot/message/broadcast \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"messages":[{"type":"text","text":"🚨 GBP週次投稿ワークフローが失敗しました。GitHub Actionsのログを確認してください。"}]}'
